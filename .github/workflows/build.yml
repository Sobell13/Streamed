name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  workflow_dispatch:

  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'
      - '.github/workflows/**'
      - 'repo.json'
      - 'DomainCheck.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout build storage
        uses: actions/checkout@v4
        with:
          path: "builds"
          fetch-depth: 1

      - name: Checkout or create builds branch
        working-directory: builds
        shell: bash
        run: |
          if git fetch --depth=1 origin refs/heads/builds; then
            echo "Using existing builds branch"
            git checkout -B builds FETCH_HEAD
          else
            echo "Creating builds branch for the first time"
            git checkout --orphan builds
            git rm -rf . || true
          fi

      - name: Clean old builds
        run: rm -f $GITHUB_WORKSPACE/builds/*.cs3

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds || true
          cp build/plugins.json $GITHUB_WORKSPACE/builds || true

      - name: Push builds
        working-directory: builds
        shell: bash
        run: |
          git config user.email "19193335+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add -A

          if git diff --cached --quiet; then
            echo "No build changes"
            exit 0
          fi

          if git rev-parse --verify HEAD >/dev/null 2>&1; then
            git commit --amend -m "Build $GITHUB_SHA"
          else
            git commit -m "Build $GITHUB_SHA"
          fi

          git push origin HEAD:builds --force